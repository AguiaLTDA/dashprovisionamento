  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

v style=\"background:{{ headerBg }}; padding:36px 48px; display:flex; justify-content:space-between; align-items:flex-end; gap:24px; flex-wrap:wrap;\">\n    <div>\n      <div style=\"font:600 11px/1 'IBM Plex Mono', monospace; letter-spacing:.14em; color:oklch(85% 0.03 255); text-transform:uppercase; margin-bottom:10px;\">Coordenação Acadêmica · 2026<\u002Fdiv>\n      <h1 style=\"margin:0; font:800 30px/1.2 'Work Sans', sans-serif; color:oklch(99% 0.003 255); letter-spacing:-0.01em;\">Controle Orçamentário — Eventos Acadêmicos<\u002Fh1>\n      <p style=\"margin:10px 0 0; font:400 13.5px/1.5 'Work Sans', sans-serif; color:oklch(85% 0.02 255); max-width:640px;\">Valores executados calculados automaticamente a partir de solicitações com status = FINALIZADO. Valor contabilizado = valor confirmado.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:10px; align-items:center;\">\n      <span style=\"font:500 12px 'Work Sans', sans-serif; color:oklch(85% 0.02 255);\">Exibir em<\u002Fspan>\n      <div style=\"display:flex; background:oklch(30% 0.04 255); border-radius:8px; padding:3px; gap:2px;\">\n        <button style=\"border:none; cursor:pointer; padding:7px 14px; border-radius:6px; font:600 12.5px 'IBM Plex Mono', monospace; background:{{ unitIsRS }}; color:{{ unitIsRSText }};\" onclick=\"{{ setUnitRS }}\">R$<\u002Fbutton>\n        <button style=\"border:none; cursor:pointer; padding:7px 14px; border-radius:6px; font:600 12.5px 'IBM Plex Mono', monospace; background:{{ unitIsPCT }}; color:{{ unitIsPCTText }};\" onclick=\"{{ setUnitPCT }}\">%<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1280px; margin:0 auto; padding:0 48px;\">\n\n    <!-- GOOGLE SHEETS CONNECTOR -->\n    <div style=\"background:oklch(99% 0.003 255); border-radius:12px; padding:16px 20px; margin:20px 0 32px; box-shadow:0 4px 18px oklch(20% 0.02 255 / 0.06); display:flex; align-items:center; gap:12px; flex-wrap:wrap;\">\n      <span style=\"width:9px; height:9px; border-radius:50%; background:{{ sheetDotColor }}; flex:none;\"><\u002Fspan>\n      <span style=\"font:600 12px 'Work Sans', sans-serif; color:oklch(35% 0.02 255); flex:none;\">Fonte de dados: {{ sheetStatusLabel }}<\u002Fspan>\n      <input type=\"text\" placeholder=\"Cole aqui o link CSV publicado do Google Sheets…\" value=\"{{ sheetUrlInput }}\" onchange=\"{{ onSheetUrlChange }}\" style=\"flex:1; min-width:260px; padding:9px 12px; border-radius:7px; border:1px solid oklch(88% 0.01 255); font:500 12.5px 'Work Sans', sans-serif; color:oklch(25% 0.02 255); outline:none;\">\n      <button onclick=\"{{ onConnectSheet }}\" style=\"border:none; cursor:pointer; padding:9px 16px; border-radius:7px; font:600 12.5px 'Work Sans', sans-serif; background:oklch(30% 0.05 255); color:oklch(99% 0.003 255); flex:none;\">{{ connectBtnLabel }}<\u002Fbutton>\n      <sc-if value=\"{{ hasSheetUrl }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ onDisconnectSheet }}\" style=\"border:1px solid oklch(85% 0.02 255); cursor:pointer; padding:9px 14px; border-radius:7px; font:600 12px 'Work Sans', sans-serif; background:transparent; color:oklch(45% 0.02 255); flex:none;\">Desconectar<\u002Fbutton>\n      <\u002Fsc-if>\n      <div style=\"flex-basis:100%; font:400 11.5px 'Work Sans', sans-serif; color:oklch(55% 0.02 255); line-height:1.5;\">\n        No Sheets: <strong>Arquivo → Compartilhar → Publicar na Web<\u002Fstrong> → selecione a aba → formato <strong>CSV<\u002Fstrong> → Publicar, e cole o link gerado acima. Colunas esperadas: ID (opcional), Curso/Evento, Área, Orçado, Executado.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPI CARDS -->\n    <div style=\"display:grid; grid-template-columns:repeat(4, 1fr); gap:18px; margin-top:-28px;\">\n      <div style=\"background:oklch(99% 0.003 255); border-radius:12px; padding:20px 22px; box-shadow:0 4px 18px oklch(20% 0.02 255 / 0.08); border-top:3px solid oklch(48% 0.13 255);\">\n        <div style=\"font:600 11px 'IBM Plex Mono', monospace; letter-spacing:.08em; text-transform:uppercase; color:oklch(50% 0.02 255);\">Orçamento Total<\u002Fdiv>\n        <div style=\"font:700 24px 'IBM Plex Mono', monospace; margin-top:8px; color:oklch(22% 0.02 255);\">{{ kpiOrcado }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:oklch(99% 0.003 255); border-radius:12px; padding:20px 22px; box-shadow:0 4px 18px oklch(20% 0.02 255 / 0.08); border-top:3px solid oklch(55% 0.13 145);\">\n        <div style=\"font:600 11px 'IBM Plex Mono', monospace; letter-spacing:.08em; text-transform:uppercase; color:oklch(50% 0.02 255);\">Total Executado<\u002Fdiv>\n        <div style=\"font:700 24px 'IBM Plex Mono', monospace; margin-top:8px; color:oklch(22% 0.02 255);\">{{ kpiExecutado }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:oklch(99% 0.003 255); border-radius:12px; padding:20px 22px; box-shadow:0 4px 18px oklch(20% 0.02 255 / 0.08); border-top:3px solid oklch(60% 0.01 255);\">\n        <div style=\"font:600 11px 'IBM Plex Mono', monospace; letter-spacing:.08em; text-transform:uppercase; color:oklch(50% 0.02 255);\">Saldo Disponível<\u002Fdiv>\n        <div style=\"font:700 24px 'IBM Plex Mono', monospace; margin-top:8px; color:oklch(22% 0.02 255);\">{{ kpiSaldo }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:oklch(99% 0.003 255); border-radius:12px; padding:20px 22px; box-shadow:0 4px 18px oklch(20% 0.02 255 / 0.08); border-top:3px solid oklch(65% 0.15 85);\">\n        <div style=\"font:600 11px 'IBM Plex Mono', monospace; letter-spacing:.08em; text-transform:uppercase; color:oklch(50% 0.02 255);\">% Executado<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:10px; margin-top:8px;\">\n          <div style=\"font:700 24px 'IBM Plex Mono', monospace; color:oklch(22% 0.02 255);\">{{ kpiPct }}<\u002Fdiv>\n          <div style=\"flex:1; height:6px; background:oklch(90% 0.01 255); border-radius:3px; overflow:hidden;\">\n );\">{{ a.pctLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:oklch(99% 0.003 255); border-radius:12px; padding:22px; box-shadow:0 4px 18px oklch(20% 0.02 255 / 0.06); overflow:hidden;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n          <div style=\"font:600 13px 'Work Sans', sans-serif; color:oklch(30% 0.02 255); margin-bottom:16px;\">Orçado vs. Executado por Curso/Evento<\u002Fdiv>\n          <div style=\"font:500 11px 'Work Sans', sans-serif; color:oklch(55% 0.02 255);\">{{ barCount }} itens · segue os filtros abaixo<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px; max-height:280px; overflow-y:auto; padding-right:6px;\">\n          <sc-for list=\"{{ barCourses }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div>\n              <div style=\"display:flex; justify-content:space-between; font:500 11.5px 'Work Sans', sans-serif; color:oklch(35% 0.02 255); margin-bottom:3px;\">\n                <span style=\"overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%;\">{{ c.nome }}<\u002Fspan>\n                <span style=\"font:600 11px 'IBM Plex Mono', monospace; color:oklch(45% 0.02 255);\">{{ c.execLabel }} / {{ c.orcLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:relative; height:9px; background:oklch(91% 0.01 255); border-radius:5px; overflow:hidden;\">\n                <div style=\"position:absolute; inset:0; width:{{ c.barWidth }}; background:{{ c.areaColor }}; opacity:0.35;\"><\u002Fdiv>\n                <div style=\"position:absolute; inset:0; width:{{ c.execWidth }}; background:{{ c.areaColor }}; border-radius:5px;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!- ">\n            <div onclick=\"{{ col.onClick }}\" style=\"text-align:{{ col.align }}; padding:{{ rowPad }} 14px; background:oklch(94% 0.008 255); font:600 10.5px 'IBM Plex Mono', monospace; letter-spacing:.05em; text-transform:uppercase; color:oklch(40% 0.02 255); cursor:pointer; user-select:none; white-space:nowrap;\">{{ col.label }} {{ col.arrow }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{ tableCourses }}\" as=\"c\" hint-placeholder-count=\"8\">\n          <div style=\"display:grid; grid-template-columns:46px minmax(160px,1.6fr) 84px 108px 108px 108px 96px 118px; border-top:1px solid oklch(93% 0.008 255);\">\n            <div style=\"padding:{{ rowPad }} 14px; font:500 12.5px 'IBM Plex Mono', monospace; color:oklch(55% 0.02 255); display:flex; align-items:center;\">{{ c.id }}<\u002Fdiv>\n            <div style=\"padding:{{ rowPad }} 14px; font:600 13px 'Work Sans', sans-serif; color:oklch(22% 0.02 255); display:flex; align-items:center;\">{{ c.nome }}<\u002Fdiv>\n            <div style=\"padding:{{ rowPad }} 14px; display:flex; align-items:center;\">\n              <span style=\"font:600 10.5px 'IBM Plex Mono', monospace; padding:3px 8px; border-radius:5px; background:{{ c.areaBg }}; color:{{ c.areaColor }};\">{{ c.area }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:{{ rowPad }} 14px; text-align:right; font:600 12.5px 'IBM Plex Mono', monospace; color:oklch(35% 0.02 255); display:flex; align-items:center; justify-content:flex-end;\">{{ c.orcadoLabel }}<\u002Fdiv>\n            <div style=\"padding:{{ rowPad }} 10px; text-align:right; display:flex; align-items:center; justify-content:flex-end;\">\n              <input type=\"number\" step=\"0.01\" value=\"{{ c.executadoRaw }}\" onchange=\"{{ c.onExecutadoChange }}\" style=\"width:88px; text-align:right; padding:5px 6px; border-radius:6px; border:1px solid oklch(90% 0.01 255); font:600 12.5px 'IBM Plex Mono', monospace; color:oklch(25% 0.02 255); background:oklch(98% 0.003 255);\">\n            <\u002Fdiv>\n            <div style=\"padding:{{ rowPad }} 14px; text-align:right; font:600 12.5px 'IBM Plex Mono', monospace; color:oklch(35% 0.02 255); display:flex; align-items:center; justify-content:flex-end;\">{{ c.saldoLabel }}<\u002Fdiv>\n            <div style=\"padding:{{ rowPad }} 14px; display:flex; align-items:center; justify-content:flex-end; gap:8px;\">\n              <div style=\"width:34px; height:6px; background:oklch(91% 0.01 255); border-radius:3px; overflow:hidden; flex:none;\">\n                <div style=\"height:100%; width:{{ c.pctWidth }}; background:{{ c.statusColor }}; border-radius:3px;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font:600 11px 'IBM Plex Mono', monospace; color:oklch(40% 0.02 255);\">{{ c.pctLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:{{ rowPad }} 14px; display:flex; align-items:center;\">\n              <span style=\"font:600 10.5px 'Work Sans', sans-serif; padding:4px 10px; border-radius:20px; background:{{ c.statusBg }}; color:{{ c.statusColor }};\">{{ c.status }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <div style=\"display:grid; grid-template-columns:46px minmax(160px,1.6fr) 84px 108px 108px 108px 96px 118px; border-top:2px solid oklch(85% 0.01 255); background:oklch(95% 0.006 255);\">\n          <div style=\"grid-column:1 / span 3; padding:14px; font:700 12px 'Work Sans', sans-serif; color:oklch(22% 0.02 255); text-transform:uppercase; letter-spacing:.04em; display:flex; align-items:center;\">{{ footerLabel }}<\u002Fdiv>\n          <div style=\"padding:14px 10px; text-align:right; font:700 13px 'IBM Plex Mono', monospace; color:oklch(22% 0.02 255); display:flex; align-items:center; justify-content:flex-end;\">{{ footerOrcado }}<\u002Fdiv>\n          <div style=\"padding:14px 10px; text-align:right; font:700 13px 'IBM Plex Mono', monospace; color:oklch(22% 0.02 255); display:flex; align-items:center; justify-content:flex-end;\">{{ footerExecutado }}<\u002Fdiv>\n          <div style=\"padding:14px; text-align:right; font:700 13px 'IBM Plex Mono', monospace; color:oklch(22% 0.02 255); display:flex; align-items:center; justify-content:flex-end;\">{{ footerSaldo }}<\u002Fdiv>\n          <div style=\"padding:14px; text-align:right; font:700 13px 'IBM Plex Mono', monospace; color:oklch(22% 0.02 255); display:flex; align-items:center; justify-content:flex-end;\">{{ footerPct }}<\u002Fdiv>\n          <div><\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n      <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:40px; text-align:center; font:500 13px 'Work Sans', sans-serif; color:oklch(55% 0.02 255);\">Nenhum curso/evento encontrado com os filtros atuais.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:16px; font:400 11.5px 'Work Sans', sans-serif; color:oklch(55% 0.02 255); text-align:center;\">\n      Clique nos títulos das colunas para ordenar · Clique no valor de Executado para editar (Orçado é fixo)\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;primaryAccent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;oklch(30% 0.06 200)&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;oklch(30% 0.05 255)&quot;,&quot;oklch(28% 0.06 235)&quot;,&quot;oklch(32% 0.03 250)&quot;,&quot;oklch(30% 0.06 200)&quot;],&quot;section&quot;:&quot;Aparência&quot;},&quot;tableDensity&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;comfortable&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;section&quot;:&quot;Tabela&quot;},&quot;defaultUnit&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;RS&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;RS&quot;,&quot;PCT&quot;],&quot;section&quot;:&quot;Tabela&quot;}}\">\nconst RAW_COURSES = [\n  { id: 1, nome: \"Café e Lanches (Prof., Coord. e Consultores)\", area: \"GERAL\", orcado: 3840.00, executado: 2623.64 },\n  { id: 2, nome: \"Confraternização de Colegiado - DTNH\", area: \"DTNH\", orcado: 1250.00, executado: 0 },\n  { id: 3, nome: \"Direito / Viagem Brasília\", area: \"DTNH\", orcado: 5218.14, executado: 0 },\n  { id: 4, nome: \"Análise e Desenvolvimento de Sistemas\", area: \"DTNH\", orcado: 639.93, executado: 0 },\n  { id: 5, nome: \"Arquitetura e Urbanismo\", area: \"DTNH\", orcado: 261.02, executado: 0 },\n  { id: 6, nome: \"Agronomia\", area: \"DTNH\", orcado: 597.83, executado: 0 },\n  { id: 7, nome: \"Engenharia Mecânica\", area: \"DTNH\", orcado: 261.02, executado: 0 },\n  { id: 8, nome: \"Administração\", area: \"DTNH\", orcado: 395.75, executado: 0 },\n  { id: 9, nome: \"Ciências Contábeis\", area: \"DTNH\", orcado: 345.22, executado: 0 },\n  { id: 10, nome: \"Engenharia de Produção\", area: \"DTNH\", orcado: 185.24, executado: 0 },\n  { id: 11, nome: \"Comunicação Social\", area: \"DTNH\", orcado: 143.14, executado: 0 },\n  { id: 12, nome: \"Confraternização de Colegiado - DCS\", area: \"DCS\", orcado: 1550.00, executado: 0 },\n  { id: 13, nome: \"Odontologia\", area: \"DCS\", orcado: 1018.83, executado: 0 },\n  { id: 14, nome: \"Enfermagem\", area: \"DCS\", orcado: 1128.30, executado: 0 },\n  { id: 15, nome: \"Fisioterapia\", area: \"DCS\", orcado: 1566.14, executado: 0 },\n  { id: 16, nome: \"Psicologia\", area: \"DCS\", orcado: 1212.50, executado: 0 },\n  { id: 17, nome: \"Medicina Veterinária\", area: \"DCS\", orcado: 825.17, executado: 0 },\n  { id: 18, nome: \"Educação Física\", area: \"DCS\", orcado: 244.18, executado: 0 },\n  { id: 19, nome: \"Farmácia\", area: \"DCS\", orcado: 437.85, executado: 0 },\n  { id: 20, nome: \"Confraternização - CEP\", area: \"CEP\", orcado: 600.00, executado: 0 },\n];\n\nconst AREA_COLORS = {\n  GERAL: \"oklch(55% 0.11 255)\",\n  DTNH: \"oklch(55% 0.11 200)\",\n  DCS: \"oklch(55% 0.11 320)\",\n  CEP: \"oklch(55% 0.11 80)\",\n};\nconst AREA_ORDER = [\"GERAL\", \"DTNH\", \"DCS\", \"CEP\"];\n\nfunction fmtBRL(v) {\n  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });\n}\nfunction fmtPct(v) {\n  return (v * 100).toFixed(1) + '%';\n}\nfunction statusOf(orcado, executado) {\n  if (executado <= 0) return 'Não Utilizado';\n  if (executado >= orcado) return 'Concluído';\n  return 'Em Execução';\n}\nfunction statusColors(status) {\n  if (status === 'Não Utilizado') return { bg: 'oklch(92% 0.01 255)', color: 'oklch(48% 0.02 255)' };\n  if (status === 'Concluído') return { bg: 'oklch(93% 0.09 145)', color: 'oklch(40% 0.13 145)' };\n  return { bg: 'oklch(95% 0.09 85)', color: 'oklch(42% 0.13 85)' };\n}\n\nfunction normHeader(s) {\n  return String(s || '').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g, '').trim();\n}\n\nfunction parseNumberBR(raw) {\n  if (raw == null) return 0;\n  let s = String(raw).trim().replace(/[^0-9,.\\-]/g, '');\n  if (s === '') return 0;\n  if (s.includes(',') && s.includes('.')) {\n    s = s.replace(/\\./g, '').replace(',', '.');\n  } else if (s.includes(',')) {\n    s = s.replace(',', '.');\n  }\n  const n = parseFloat(s);\n  return isNaN(n) ? 0 : n;\n}\n\n// Some spreadsheet exports split a comma-decimal number (\"3840,00\") into two\n// CSV fields (\"3840\" and \"00\") because comma is also the field delimiter.\n// Each split field shifts every column after it — so decoding must walk the\n// row left-to-right consuming 1 or 2 fields per column (based on whether the\n// next field looks like a bare 1-2 digit fraction), rather than reading by\n// fixed header index.\nfunction readRowByHeaderOrder(row, fields) {\n  // fields: [{ name, headerIdx, numeric }] — only entries with headerIdx !== -1\n  const ordered = fields.filter(f => f.headerIdx !== -1).sort((a, b) => a.headerIdx - b.headerIdx);\n  const out = {};\n  let cursor = 0;\n  ordered.forEach(f => {\n    const raw = row[cursor];\n    if (f.numeric) {\n      const next = row[cursor + 1];\n      if (next != null && /^\\s*\\d{1,2}\\s*$/.test(String(next))) {\n        const n = parseNumberBR(raw);\n        const frac = String(next).trim().padEnd(2, '0');\n        out[f.name] = parseFloat(n.toFixed(0) + '.' + frac);\n        cursor += 2;\n      } else {\n        out[f.name] = parseNumberBR(raw);\n        cursor += 1;\n      }\n    } else {\n      out[f.name] = raw;\n      cursor += 1;\n    }\n  });\n  return out;\n}\n\nfunction parseCSV(text) {\n  const rows = [];\n  let row = [], field = '', inQuotes = false;\n  for (let i = 0; i < text.length; i++) {\n    const ch = text[i];\n    if (inQuotes) {\n      if (ch === '\"') {\n        if (text[i + 1] === '\"') { field += '\"'; i++; } else inQuotes = false;\n      } else field += ch;\n    } else {\n      if (ch === '\"') inQuotes = true;\n      else if (ch === ',') { row.push(field); field = ''; }\n      else if (ch === '\\n') { row.push(field); rows.push(row); row = []; field = ''; }\n      else if (ch === '\\r') { /* skip */ }\n      else field += ch;\n    }\n  }\n  if (field.length || row.length) { row.push(field); rows.push(row); }\n  return rows.filter(r => r.some(c => c.trim() !== ''));\n}\n\nfunction coursesFromCSV(text) {\n  const rows = parseCSV(text);\n  if (rows.length < 2) throw new Error('Planilha vazia ou sem cabeçalho.');\n  const header = rows[0].map(normHeader);\n  const idx = {\n    id: header.findIndex(h => h === 'id' || h.startsWith('id ') || h.startsWith('id(')),\n    nome: header.findIndex(h => h.includes('curso') || h.includes('nome') || h.includes('evento')),\n    area: header.findIndex(h => h.includes('area')),\n    orcado: header.findIndex(h => h.includes('orcad')),\n    executado: header.findIndex(h => h.includes('execut')),\n  };\n  if (idx.nome === -1 || idx.orcado === -1 || idx.executado === -1) {\n    throw new Error('Colunas obrigatórias não encontradas (Curso/Evento, Orçado, Executado).');\n  }\n  const fieldDefs = [\n    { name: 'id', headerIdx: idx.id, numeric: true },\n    { name: 'nome', headerIdx: idx.nome, numeric: false },\n    { name: 'area', headerIdx: idx.area, numeric: false },\n    { name: 'orcado', headerIdx: idx.orcado, numeric: true },\n    { name: 'executado', headerIdx: idx.executado, numeric: true },\n  ];\n\n  return rows.slice(1).map((r, i) => {\n    const parsed = readRowByHeaderOrder(r, fieldDefs);\n    return {\n      id: idx.id !== -1 && parsed.id ? parsed.id : (i + 1),\n      nome: (parsed.nome || '').trim(),\n      area: (parsed.area || 'GERAL').trim().toUpperCase() || 'GERAL',\n      orcado: parsed.orcado || 0,\n      executado: parsed.executado || 0,\n    };\n  }).filter(c => c.nome);\n}\n\nconst STORAGE_KEY = 'dash-orc-2026-sheet-url';\n\nclass Component extends DCLogic {\n  state = {\n    courses: RAW_COURSES.map(c => ({ ...c })),\n    search: '',\n    areaFilter: 'ALL',\n    statusFilter: 'ALL',\n    unit: this.props.defaultUnit || 'RS',\n    sortKey: 'orcado',\n    sortDir: 'desc',\n    sheetUrlInput: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-5dZsdv_MYzrCfWYc4kMnf-2kV7UQ5nbpOHJnrGJCrGl_Tj9bHueRlMHFdN9vZJr78LigYO2rUcZY/pub?output=csv',\n    sheetUrl: '',\n    sheetStatus: 'idle', // idle | loading | success | error\n    sheetError: '',\n  };\n\n  componentDidMount() {\n    let saved = null;\n    try { saved = window.localStorage.getItem(STORAGE_KEY); } catch (e) {}\n    const url = saved || this.state.sheetUrlInput;\n    if (url) {\n      this.setState({ sheetUrlInput: url, sheetUrl: url });\n      this.loadSheet(url);\n    }\n  }\n\n  loadSheet = (url) => {\n    if (!url) return;\n    this.setState({ sheetStatus: 'loading', sheetError: '' });\n    fetch(url)\n      .then(res => {\n        if (!res.ok) throw new Error('Não foi possível acessar o link (HTTP ' + res.status + ').');\n        return res.text();\n      })\n      .then(text => {\n        const courses = coursesFromCSV(text);\n        if (!courses.length) throw new Error('Nenhuma linha de dados válida encontrada.');\n        setTimeout(() => this.setState({ courses, sheetStatus: 'success', sheetUrl: url }), 0);\n      })\n      .catch(err => {\n        setTimeout(() => this.setState(s => ({\n          sheetStatus: 'error',\n          sheetError: (err && err.message) || 'Falha ao carregar a planilha.',\n          courses: (s.courses && s.courses.length) ? s.courses : RAW_COURSES.map(c => ({ ...c })),\n        })), 0);\n      });\n  };\n\n  onConnectSheet = () => {\n    const url = this.state.sheetUrlInput.trim();\n    if (!url) return;\n    try { window.localStorage.setItem(STORAGE_KEY, url); } catch (e) {}\n    this.loadSheet(url);\n  };\n\n  onDisconnectSheet = () => {\n    try { window.localStorage.removeItem(STORAGE_KEY); } catch (e) {}\n    this.setState({ sheetUrl: '', sheetUrlInput: '', sheetStatus: 'idle', sheetError: '', courses: RAW_COURSES.map(c => ({ ...c })) });\n  };\n\n  updateValue = (id, field, value) => {\n    const n = parseFloat(value);\n    this.setState(s => ({\n      courses: s.courses.map(c => c.id === id ? { ...c, [field]: isNaN(n) ? 0 : n } : c)\n    }));\n  };\n\n  setSort = (key) => {\n    this.setState(s => ({\n      sortKey: key,\n      sortDir: s.sortKey === key && s.sortDir === 'desc' ? 'asc' : 'desc'\n    }));\n  };\n\n  renderVals() {\n    const primary = this.props.primaryAccent || 'oklch(30% 0.05 255)';\n    const density = this.props.tableDensity || 'comfortable';\n    const rowPad = density === 'compact' ? '7px' : '13px';\n\n    const enriched = this.state.courses.map(c => {\n      const saldo = c.orcado - c.executado;\n      const pctExec = c.orcado > 0 ? c.executado / c.orcado : 0;\n      const status = statusOf(c.orcado, c.executado);\n      return { ...c, saldo, pctExec, status };\n    });\n\n    const totalOrcado = enriched.reduce((s, c) => s + c.orcado, 0);\n    const totalExecutado = enriched.reduce((s, c) => s + c.executado, 0);\n    const totalSaldo = totalOrcado - totalExecutado;\n    const totalPct = totalOrcado > 0 ? totalExecutado / totalOrcado : 0;\n\n    const unit = this.state.unit;\n    const valFmt = (v) => unit === 'RS' ? fmtBRL(v) : fmtPct(totalOrcado > 0 ? v / totalOrcado : 0);\n\n    // Area totals for donut\n    const areaMap = {};\n    enriched.forEach(c => {\n      if (!areaMap[c.area]) areaMap[c.area] = { area: c.area, orcado: 0, executado: 0 };\n      areaMap[c.area].orcado += c.orcado;\n      areaMap[c.area].executado += c.executado;\n    });\n    const areaTotalsRaw = AREA_ORDER.filter(a => areaMap[a]).map(a => areaMap[a]);\n    let cursor = 0;\n    const gradientParts = [];\n    const areaTotals = areaTotalsRaw.map(a => {\n      const pct = totalOrcado > 0 ? a.orcado / totalOrcado : 0;\n      const start = cursor;\n      const end = cursor + pct * 360;\n      cursor = end;\n      const color = AREA_COLORS[a.area] || 'oklch(60% 0.02 255)';\n      gradientParts.push(`${color} ${start}deg ${end}deg`);\n      return { area: a.area, color, pctLabel: fmtPct(pct) };\n    });\n    const donutGradient = `conic-gradient(${gradientParts.join(', ')})`;\n\n    // Filters\n    const searchLower = this.state.search.toLowerCase();\n    let filtered = enriched.filter(c =>\n      (this.state.areaFilter === 'ALL' || c.area === this.state.areaFilter) &&\n      (this.state.statusFilter === 'ALL' || c.status === this.state.statusFilter) &&\n      c.nome.toLowerCase().includes(searchLower)\n    );\n\n    // Sort\n    const key = this.state.sortKey;\n    const dir = this.state.sortDir === 'asc' ? 1 : -1;\n    filtered = [...filtered].sort((a, b) => {\n      let av = a[key], bv = b[key];\n      if (typeof av === 'string') return av.localeCompare(bv) * dir;\n      return (av - bv) * dir;\n    });\n\n    const maxOrcadoFiltered = Math.max(1, ...filtered.map(c => c.orcado));\n\n    const tableCourses = filtered.map(c => {\n      const sc = statusColors(c.status);\n      const areaColor = AREA_COLORS[c.area] || 'oklch(60% 0.02 255)';\n      return {\n        id: c.id,\n        nome: c.nome,\n        area: c.area,\n        areaBg: areaColor.replace('55%', '93%').replace('0.11', '0.05'),\n        areaColor: areaColor,\n        orcadoRaw: c.orcado,\n        orcadoLabel: fmtBRL(c.orcado),\n        executadoRaw: c.executado,\n        saldoLabel: valFmt(c.saldo),\n        pctLabel: fmtPct(c.pctExec),\n        pctWidth: Math.min(100, c.pctExec * 100) + '%',\n        status: c.status,\n        statusBg: sc.bg,\n        statusColor: sc.color,\n        onExecutadoChange: (e) => this.updateValue(c.id, 'executado', e.target.value),\n      };\n    });\n\n    const barCourses = [...filtered].sort((a, b) => b.orcado - a.orcado).map(c => ({\n      nome: c.nome,\n      orcLabel: fmtBRL(c.orcado),\n      execLabel: fmtBRL(c.executado),\n      barWidth: (c.orcado / maxOrcadoFiltered * 100) + '%',\n      execWidth: (Math.min(c.orcado, c.executado) / maxOrcadoFiltered * 100) + '%',\n      areaColor: AREA_COLORS[c.area] || 'oklch(60% 0.02 255)',\n    }));\n\n    const columnDefs = [\n      { key: 'id', label: '#', align: 'left' },\n      { key: 'nome', label: 'Curso / Evento', align: 'left' },\n      { key: 'area', label: 'Área', align: 'left' },\n      { key: 'orcado', label: 'Orçado', align: 'right' },\n      { key: 'executado', label: 'Executado', align: 'right' },\n      { key: 'saldo', label: 'Saldo', align: 'right' },\n      { key: 'pctExec', label: '% Exec.', align: 'right' },\n      { key: 'status', label: 'Status', align: 'left' },\n    ];\n    const columns = columnDefs.map(col => ({\n      label: col.label,\n      align: col.align,\n      arrow: this.state.sortKey === col.key ? (this.state.sortDir === 'asc' ? '▲' : '▼') : '',\n      onClick: () => this.setSort(col.key),\n    }));\n\n    const areaChipDefs = ['ALL', ...AREA_ORDER];\n    const areaChips = areaChipDefs.map(a => {\n      const active = this.state.areaFilter === a;\n      const color = a === 'ALL' ? primary : (AREA_COLORS[a] || primary);\n      return {\n        label: a === 'ALL' ? 'Todas as Áreas' : a,\n        onClick: () => this.setState({ areaFilter: a }),\n        bg: active ? color : 'oklch(99% 0.003 255)',\n        color: active ? 'oklch(99% 0.003 255)' : 'oklch(35% 0.02 255)',\n        border: active ? color : 'oklch(88% 0.01 255)',\n      };\n    });\n\n    const statusDefs = ['ALL', 'Em Execução', 'Não Utilizado', 'Concluído'];\n    const statusChips = statusDefs.map(s => {\n      const active = this.state.statusFilter === s;\n      const sc = s === 'ALL' ? { bg: primary, color: primary } : statusColors(s);\n      return {\n        label: s === 'ALL' ? 'Todos os Status' : s,\n        onClick: () => this.setState({ statusFilter: s }),\n        bg: active ? (s === 'ALL' ? primary : sc.color) : 'oklch(99% 0.003 255)',\n        color: active ? 'oklch(99% 0.003 255)' : 'oklch(35% 0.02 255)',\n        border: active ? (s === 'ALL' ? primary : sc.color) : 'oklch(88% 0.01 255)',\n      };\n    });\n\n    const hasFilter = this.state.areaFilter !== 'ALL' || this.state.statusFilter !== 'ALL' || this.state.search !== '';\n    const filteredOrcado = filtered.reduce((s, c) => s + c.orcado, 0);\n    const filteredExecutado = filtered.reduce((s, c) => s + c.executado, 0);\n    const filteredSaldo = filteredOrcado - filteredExecutado;\n    const filteredPct = filteredOrcado > 0 ? filteredExecutado / filteredOrcado : 0;\n\n    const sheetDot = { idle: 'oklch(75% 0.01 255)', loading: 'oklch(70% 0.14 85)', success: 'oklch(55% 0.13 145)', error: 'oklch(55% 0.18 25)' }[this.state.sheetStatus];\n    const sheetLabel = {\n      idle: 'não conectada (usando dados de exemplo)',\n      loading: 'carregando…',\n      success: 'conectada ✓',\n      error: 'erro — ' + this.state.sheetError,\n    }[this.state.sheetStatus];\n\n    return {\n      sheetDotColor: sheetDot,\n      sheetStatusLabel: sheetLabel,\n      sheetUrlInput: this.state.sheetUrlInput,\n      onSheetUrlChange: (e) => this.setState({ sheetUrlInput: e.target.value }),\n      onConnectSheet: this.onConnectSheet,\n      onDisconnectSheet: this.onDisconnectSheet,\n      hasSheetUrl: !!this.state.sheetUrl,\n      connectBtnLabel: this.state.sheetStatus === 'loading' ? 'Carregando…' : 'Conectar',\n\n      headerBg: `linear-gradient(135deg, ${primary}, oklch(26% 0.05 255))`,\n      unitIsRS: unit === 'RS' ? 'oklch(99% 0.003 255)' : 'transparent',\n      unitIsRSText: unit === 'RS' ? 'oklch(25% 0.05 255)' : 'oklch(85% 0.02 255)',\n      unitIsPCT: unit === 'PCT' ? 'oklch(99% 0.003 255)' : 'transparent',\n      unitIsPCTText: unit === 'PCT' ? 'oklch(25% 0.05 255)' : 'oklch(85% 0.02 255)',\n      setUnitRS: () => this.setState({ unit: 'RS' }),\n      setUnitPCT: () => this.setState({ unit: 'PCT' }),\n\n      kpiOrcado: fmtBRL(totalOrcado),\n      kpiExecutado: fmtBRL(totalExecutado),\n      kpiSaldo: fmtBRL(totalSaldo),\n      kpiPct: fmtPct(totalPct),\n      kpiPctWidth: Math.min(100, totalPct * 100) + '%',\n\n      donutGradient,\n      areaTotals,\n      areaCount: areaTotals.length,\n\n      barCourses,\n      barCount: barCourses.length,\n\n      search: this.state.search,\n      onSearch: (e) => this.setState({ search: e.target.value }),\n      areaChips,\n      statusChips,\n\n      columns,\n      rowPad,\n      tableCourses,\n      isEmpty: tableCourses.length === 0,\n\n      footerLabel: hasFilter ? 'Total (filtrado)' : 'Total Geral',\n      footerOrcado: valFmt(filteredOrcado),\n      footerExecutado: valFmt(filteredExecutado),\n      footerSaldo: valFmt(filteredSaldo),\n      footerPct: fmtPct(filteredPct),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
